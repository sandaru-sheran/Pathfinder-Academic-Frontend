<div class="dashboard-container">

  <div class="back-nav">
    <a routerLink="/lecturer-dashboard" class="back-link">← Back to Courses</a>
  </div>

  <header>
    <h2>Class Roster & Grading</h2>
    <p>Course: <strong>{{ courseName }}</strong> (ID: {{ courseId }})</p>
  </header>

  <div class="table-container">
    <table>
      <thead>
      <tr>
        <th>Reg. No</th>
        <th>Student Name</th>
        <th>Current Grade</th>
        <th>Action</th>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let student of students">
        <td>{{ student.regNumber }}</td>
        <td>{{ student.name }}</td>
        <td>
          <input type="text" [(ngModel)]="student.grade" placeholder="e.g., A, B, 85" class="grade-input">
        </td>
        <td>
          <button class="btn-save" (click)="saveGrade(student)">Save Result</button>
        </td>
      </tr>
      <tr *ngIf="students.length === 0">
        <td colspan="4" class="text-center">No students enrolled in this course yet.</td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
