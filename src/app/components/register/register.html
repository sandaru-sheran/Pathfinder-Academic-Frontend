<div class="register-container">
  <h2>Create Account</h2>
  
  <form (ngSubmit)="onSubmit()">
    
    <div class="name-row">
      <div class="form-group half-width">
        <label>First Name</label>
        <input type="text" name="firstName" [(ngModel)]="registerData.firstName" required>
      </div>
      
      <div class="form-group half-width">
        <label>Last Name</label>
        <input type="text" name="lastName" [(ngModel)]="registerData.lastName" required>
      </div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" [(ngModel)]="registerData.email" required>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" [(ngModel)]="registerData.password" required>
    </div>

    <div class="form-group">
      <label>Registration Number</label>
      <input type="text" name="registrationNumber" [(ngModel)]="registerData.registrationNumber" required>
    </div>

    <div class="form-group">
      <label>Account Type</label>
      <select name="role" [(ngModel)]="registerData.role">
        <option value="STUDENT">Student</option>
        <option value="LECTURER">Lecturer</option>
      </select>
    </div>

    <button type="submit" class="submit-btn">Register</button>

    <div *ngIf="errorMessage" class="error">{{ errorMessage }}</div>
    <div *ngIf="successMessage" class="success">{{ successMessage }}</div>

  </form>

  <p class="login-link">
    Already have an account? <a routerLink="/login">Log in here</a>
  </p>
</div>
