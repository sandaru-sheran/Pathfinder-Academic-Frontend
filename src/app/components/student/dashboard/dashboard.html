<div class="dashboard-container">

  <header class="welcome-banner">
    <div class="banner-content">
      <h2>Welcome back, {{ studentName }}!</h2>
      <p>Program: <strong>{{ program }}</strong></p>
    </div>
    <div class="quick-actions">
      <a routerLink="/student/catalog" class="btn btn-outline">Browse Catalog</a>
      <a routerLink="/student/transcript" class="btn btn-outline">My Transcript</a>
    </div>
  </header>

  <div class="active-classes-section">
    <h3>My Active Enrollments</h3>
    <div class="course-grid">

      <div class="course-card" *ngFor="let course of activeCourses">
        <div class="card-header">
          <span class="course-code">{{ course.code }}</span>
        </div>
        <div class="card-body">
          <h4>{{ course.name }}</h4>
          <p>
            <span style="font-size: 1.25rem;">👨‍🏫</span>
            <span>{{ course.instructor }}</span>
          </p>
        </div>
        <div class="card-footer">
          <a [routerLink]="['/student/classroom', course.id]" class="btn btn-primary">Go to Classroom</a>
        </div>
      </div>

      <div *ngIf="activeCourses.length === 0" class="empty-state">
        <p>You are not enrolled in any courses yet.</p>
        <a routerLink="/student/catalog" class="btn btn-primary">Find Courses</a>
      </div>

    </div>
  </div>
</div>
