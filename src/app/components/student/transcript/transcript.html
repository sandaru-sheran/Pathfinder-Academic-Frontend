<div class="dashboard-container">
  <header>
    <h2>Academic Transcript</h2>
    <p>Review your official grades and academic history.</p>
  </header>

  <div class="table-container">
    <table>
      <thead>
      <tr>
        <th>Semester</th>
        <th>Course Code</th>
        <th>Course Name</th>
        <th>Official Grade</th>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let result of results">
        <td>{{ result.semester }}</td>
        <td><strong>{{ result.courseCode }}</strong></td>
        <td>{{ result.courseName }}</td>
        <td><span class="grade-badge" [ngClass]="result.grade.charAt(0)">{{ result.grade }}</span></td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
