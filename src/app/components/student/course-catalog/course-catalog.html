<div class="dashboard-container">
  <header>
    <h2>Course Catalog</h2>
    <p>Browse available programs and register for your upcoming semester.</p>
  </header>

  <div class="table-container">
    <table>
      <thead>
      <tr>
        <th>Course Code</th>
        <th>Course Name</th>
        <th>Program Area</th>
        <th>Action</th>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let course of availableCourses">
        <td><strong>{{ course.code }}</strong></td>
        <td>{{ course.name }}</td>
        <td>{{ course.program }}</td>
        <td>
          <button
            *ngIf="!course.isEnrolled"
            class="btn btn-enroll"
            (click)="enroll(course)">
            Enroll Now
          </button>
          <span *ngIf="course.isEnrolled" class="enrolled-badge">✓ Enrolled</span>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
